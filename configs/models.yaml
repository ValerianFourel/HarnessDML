# HarnessLab model registry (§6) — frontier-first.
#
# revision: null until pinned by scripts/hpc/prefetch_models.sh (Phase 3),
#   which writes resolved commit SHAs back into this file.
# verify: true ⇒ exact hf_id/params/license must be resolved on the JUPITER
#   login node BEFORE download; if gated or absent, substitute within-family
#   and record the substitution here — never silently.
# serving_mode intent (fits-check confirms: params × dtype vs 4 × 96 GB GH200
#   per node): one_gpu | one_node_tp4 | multi_node.
#   EVERY job occupies a full node (4 GPUs) regardless of mode:
#     one_gpu      = model fits on one GPU -> 4 independent replicas per node
#                    (one per GPU, ports 8001-8004, client round-robins)
#     one_node_tp4 = model needs the node -> 1 server, --tensor-parallel-size 4
#   "one_gpu" describes the model's footprint, never a 1-GPU allocation..
#
# Rationale (preserve): Claw-roster alignment enables the composition check of
# our component effects against their bundled-harness gaps on identical
# backbones. Capability moderation comes from within-generation G-vs-F pairs
# (cross-generation confounds capability with post-training vintage). Tier B
# validates the re-implemented instrument on CCI's validated cell before
# trusting Tier-F divergences. Tier S is out of MVP scope (enabled: false).

