# HarnessLab model registry (§6) — RESOLVED against the HF hub 2026-07-23
# (metadata queries; params from safetensors totals). All listed non-gated
# entries verified to exist and be downloadable without access requests.
#
# revision: null until pinned by scripts/hpc/prefetch_models.py, which writes
#   SHAs to configs/model_revisions.lock.yaml (merged by load_registry).
# dtype: weight storage — bf16 (default) or fp8 (native FP8, 1 byte/param);
#   fits-check uses it.
# serving_mode (fits-check enforced: params × dtype × 1.35 overhead vs
#   0.9 × 96 GB / 0.9 × 384 GB). EVERY job occupies a full 4-GPU node:
#     one_gpu      = model fits one GPU -> 4 independent replicas per node
#                    (ports 8001-8004, client round-robins)
#     one_node_tp4 = model needs the node -> 1 server, --tensor-parallel-size 4
#   "one_gpu" describes the model's footprint, never a 1-GPU allocation.
#
# Resolution log (deviations from the spec's §6 table — never silent):
#   - GLM-5.x is 753B total (all variants) -> physically multi-node; moved to
#     Tier S. The Claw GLM anchor is NOT available in the MVP.
#   - DeepSeek-V4-Flash (158B) fits one node only via native FP8 -> dtype: fp8.
#   - No open "Mistral Medium 3.5"/"Small 4" exists; largest open instruct is
#     Mistral-Small-3.2-24B (F slot); smallest is Ministral-3-3B (G slot).
#   - "Seed 2.0-mini" does not exist on the hub; nearest family instruct is
#     Seed-OSS-36B (needs TP4, not a weak pole) -> parked disabled.
#   - Qwen3.6 has no small variant (27B/35B only); the G pole uses Qwen3.5-9B
#     -> cross-vintage caveat applies to that within-family pair.
#   - Gemma-4 gives a clean within-generation pair (26B-A4B vs E4B), both
#     exercising the no-system-role prepended fallback.
#
# Rationale (preserve): Claw-roster alignment enables composition checks of
# component effects vs bundled-harness gaps on identical backbones (now via
# DeepSeek/Qwen/gpt-oss only). Capability moderation comes from
# within-generation G-vs-F pairs. Tier B validates the re-implemented
# instrument on CCI's validated cell before trusting Tier-F divergences.

